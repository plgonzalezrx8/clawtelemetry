name: BrowserStack

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [main]  # Run on merge to main
  pull_request:
    branches: [main]
    types: [labeled]  # Trigger by adding label 'browserstack'

jobs:
  cross-browser:
    name: Cross-Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip BrowserStack run when secrets are missing
        if: ${{ env.BROWSERSTACK_USERNAME == '' || env.BROWSERSTACK_ACCESS_KEY == '' }}
        run: |
          echo "BrowserStack secrets are not configured for this repository."
          echo "Skipping BrowserStack workflow."

      - uses: actions/setup-python@v5
        if: ${{ env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: ${{ env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        run: pip install flask pytest pytest-playwright requests browserstack-sdk

      - name: Install Playwright browsers
        if: ${{ env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        run: python3 -m playwright install chromium

      - name: Start ClawTelemetry server
        if: ${{ env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        run: |
          OPENCLAW_GATEWAY_TOKEN=ci-test-token python3 dashboard.py --port 8900 --no-debug &
          for i in $(seq 1 30); do
            curl -sf -H "Authorization: Bearer ci-test-token" http://localhost:8900/api/health && echo "Server ready" && break
            sleep 1
          done

      - name: Set up BrowserStack env
        if: ${{ env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        uses: browserstack/github-actions/setup-env@master
        with:
          username: ${{ env.BROWSERSTACK_USERNAME }}
          access-key: ${{ env.BROWSERSTACK_ACCESS_KEY }}

      - name: Start BrowserStack Local Tunnel
        if: ${{ env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: start
          local-identifier: clawtelemetry-${{ github.run_id }}

      - name: Run tests via BrowserStack SDK
        if: ${{ env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        env:
          BROWSERSTACK_LOCAL_IDENTIFIER: clawtelemetry-${{ github.run_id }}
          CLAWTELEMETRY_URL: http://localhost:8900
          CLAWTELEMETRY_TOKEN: ci-test-token
        run: |
          BUILD_NUMBER=${{ github.run_number }} browserstack-sdk python3 -m pytest tests/test_e2e_browserstack.py -v --tb=short

      - name: Stop BrowserStack Local Tunnel
        if: ${{ always() && env.BROWSERSTACK_USERNAME != '' && env.BROWSERSTACK_ACCESS_KEY != '' }}
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: stop
          local-identifier: clawtelemetry-${{ github.run_id }}

name: Auto-deploy Cloud on OSS update

on:
  push:
    branches: [main]
    paths:
      - 'dashboard.py'
      - 'clawtelemetry/**'
      - 'setup.py'
  workflow_dispatch:

jobs:
  pin-version:
    name: Rebuild cloud with latest OSS
    runs-on: ubuntu-latest
    env:
      CLOUD_REPO_PAT: ${{ secrets.CLOUD_REPO_PAT }}
    steps:
      - name: Skip cloud auto-deploy when token is missing
        if: ${{ env.CLOUD_REPO_PAT == '' }}
        run: |
          echo "CLOUD_REPO_PAT is not configured for this repository."
          echo "Skipping cloud auto-deploy workflow."

      - name: Checkout OSS repo
        if: ${{ env.CLOUD_REPO_PAT != '' }}
        uses: actions/checkout@v4

      - name: Get OSS version
        if: ${{ env.CLOUD_REPO_PAT != '' }}
        id: oss_version
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r'__version__ = \"([^\"]+)\"', open('dashboard.py').read()); print(m.group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "OSS version: $VERSION"

      - name: Checkout cloud repo
        if: ${{ env.CLOUD_REPO_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: vivekchand/clawtelemetry-cloud
          token: ${{ env.CLOUD_REPO_PAT }}
          path: clawtelemetry-cloud

      - name: Pin clawtelemetry version in cloud Dockerfile
        if: ${{ env.CLOUD_REPO_PAT != '' }}
        run: |
          cd clawtelemetry-cloud
          sed -i "s/clawtelemetry==[0-9.]*/clawtelemetry==${{ steps.oss_version.outputs.version }}/" Dockerfile
          grep -q "clawtelemetry==${{ steps.oss_version.outputs.version }}" Dockerfile || \
            sed -i "s/clawtelemetry$/clawtelemetry==${{ steps.oss_version.outputs.version }}/" Dockerfile
          echo "Dockerfile:"; grep clawtelemetry Dockerfile

      - name: Commit and push version pin
        if: ${{ env.CLOUD_REPO_PAT != '' }}
        run: |
          cd clawtelemetry-cloud
          git config user.email "automation@users.noreply.github.com"
          git config user.name "Diya (auto-deploy)"
          git add Dockerfile
          git diff --staged --quiet && echo "No change needed" || \
            git commit -m "chore: auto-pin clawtelemetry==${{ steps.oss_version.outputs.version }} from OSS"
          git push
          echo "✅ Cloud repo pinned to clawtelemetry==${{ steps.oss_version.outputs.version }} — Dhriti cron will deploy"

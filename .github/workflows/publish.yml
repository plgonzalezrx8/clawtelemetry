name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3 or v1.2.3)'
        required: true

jobs:
  release:
    name: Build and Publish Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            RAW="${{ github.event.inputs.version }}"
            if [[ "$RAW" == v* ]]; then
              TAG="$RAW"
            else
              TAG="v$RAW"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Verify dashboard version matches tag
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TAG_VERSION="${TAG#v}"
          DASHBOARD_VERSION=$(python3 -c "import re;print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('dashboard.py', encoding='utf-8').read()).group(1))")
          echo "Tag: $TAG | dashboard.py version: $DASHBOARD_VERSION"
          if [ "$TAG_VERSION" != "$DASHBOARD_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION dashboard=$DASHBOARD_VERSION"
            exit 1
          fi

      - name: Build source archive and checksums
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="clawtelemetry-${TAG}.tar.gz"
          git archive --format=tar.gz --prefix="clawtelemetry-${TAG#v}/" -o "$ARCHIVE" HEAD
          sha256sum install.sh install.ps1 install.cmd "$ARCHIVE" > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            install.sh
            install.ps1
            install.cmd
            checksums.txt
            clawtelemetry-*.tar.gz
